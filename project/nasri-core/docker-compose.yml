services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ../redis-data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ../ollama-data:/root/.ollama

  nasri-core:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - ollama
