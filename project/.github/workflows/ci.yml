name: ci

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
  pull_request:

jobs:
  core-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nasri-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Format check
        run: ruff format --check app tests

      - name: Run tests
        run: pytest -q tests
